<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥白六行事曆</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f8f9fa; }
        body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: var(--primary); font-size: 22px; margin-top: 0; display: flex; align-items: center; gap: 8px; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        textarea { resize: vertical; min-height: 80px; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); background: #fff; }
        #map-box { width: 100%; height: 180px; background: #eee; border-radius: 12px; margin-top: 10px; display: none; overflow: hidden; border: 1px solid #eee; }
        #map-box iframe { width: 100%; height: 100%; border: 0; }
        button { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; margin-top: 10px; }
        button:active { transform: scale(0.97); opacity: 0.9; }
        .hint { font-size: 12px; color: #999; text-align: center; margin-top: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h2>𓃥 白六行事曆</h2>
    <div class="field">
        <label>活動主題</label>
        <input type="text" id="title" placeholder="例如：臺北榮總門診">
    </div>
    <div class="field">
        <label>時間</label>
        <div style="display: flex; gap: 8px;">
            <input type="date" id="date">
            <input type="time" id="time">
        </div>
    </div>
    <div class="field">
        <label>地點</label>
        <input type="text" id="location" placeholder="輸入地點" onkeyup="debouncedMap()">
        <div id="map-box"><iframe id="map-iframe"></iframe></div>
    </div>
    <div class="field">
        <label>備註 (會同步存入行事曆)</label>
        <textarea id="note" placeholder="例如：診號 12 號，記得帶健保卡"></textarea>
    </div>
    <button onclick="sendInvite()">分享給好友 / 群組</button>
    <div class="hint">送出後，卡片會包含地點預覽與備註內容。</div>
</div>

<script>
    const LIFF_ID = "2009222789-j9OVLjbZ";
    let mapTimer;

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
            const params = new URLSearchParams(window.location.search);
            // 轉發自動填入邏輯（含備註 n）
            if (params.has('t')) document.getElementById('title').value = params.get('t');
            if (params.has('d')) document.getElementById('date').value = params.get('d');
            if (params.has('s')) document.getElementById('time').value = params.get('s');
            if (params.has('l')) {
                document.getElementById('location').value = params.get('l');
                debouncedMap();
            }
            if (params.has('n')) document.getElementById('note').value = params.get('n');
        } catch (e) { console.log(e); }
    }

    function debouncedMap() {
        clearTimeout(mapTimer);
        mapTimer = setTimeout(() => {
            const loc = document.getElementById('location').value;
            const box = document.getElementById('map-box');
            if (loc.trim().length > 1) {
                box.style.display = "block";
                document.getElementById('map-iframe').src = `https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=${encodeURIComponent(loc)}&language=zh-TW`;
                // 若無 Key，使用預覽版網址
                document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(loc)}&hl=zh-TW&z=16&output=embed`;
            }
        }, 800);
    }

    async function sendInvite() {
        const t = document.getElementById('title').value || "白六行程";
        const d = document.getElementById('date').value;
        const s = document.getElementById('time').value;
        const l = document.getElementById('location').value || "地點未定";
        const n = document.getElementById('note').value || "";

        if (!d || !s) return alert("請填寫日期與時間");

        const start = (d + 'T' + s).replace(/-|:/g, "") + "00";
        // 將備註加入 Google 日曆細節中
        const calUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t)}&dates=${start}/${start}&location=${encodeURIComponent(l)}&details=${encodeURIComponent(n + "\n\n(由白六行事曆產生)")}`;
        // 轉發連結也帶上備註參數
        const liffUrl = `https://liff.line.me/${LIFF_ID}?t=${encodeURIComponent(t)}&d=${d}&s=${s}&l=${encodeURIComponent(l)}&n=${encodeURIComponent(n)}`;

        const flex = {
            "type": "flex",
            "altText": `📅 邀請：${t}`,
            "contents": {
                "type": "bubble",
                "body": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六行事曆", "weight": "bold", "color": "#00b900", "size": "sm" },
                        { "type": "text", "text": t, "weight": "bold", "size": "xl", "margin": "md" },
                        { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                            { "type": "text", "text": `📅 ${d} ${s}`, "color": "#666666", "size": "sm" },
                            { "type": "text", "text": `📍 ${l}`, "color": "#666666", "size": "sm", "wrap": true }
                        ]},
                        n ? { "type": "text", "text": n, "margin": "md", "size": "sm", "color": "#333333", "wrap": true, "fontStyle": "italic" } : { "type": "spacer", "size": "xs" },
                        { "type": "text", "text": "📎 附件檔案請見下方", "size": "xxs", "color": "#aaaaaa", "margin": "xl" }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                        { "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "加入 Google/iOS 日曆", "uri": calUrl }},
                        { "type": "button", "style": "link", "color": "#aaaaaa", "action": { "type": "uri", "label": "轉發此行程", "uri": liffUrl }}
                    ]
                }
            }
        };

        try {
            const res = await liff.shareTargetPicker([flex]);
            if (res) liff.closeWindow();
        } catch (err) { alert("分享失敗"); }
    }
    init();
</script>
</body>
</html>
