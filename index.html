<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥白六行事曆</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f8f9fa; }
        body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); padding: 15px; }
        .card { background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: var(--primary); font-size: 22px; margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px; }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #444; }
        input { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,185,0,0.1); }
        
        /* 檔案導引區 */
        .file-box { background: #fdfdfd; border: 2px dashed #e0e0e0; padding: 15px; border-radius: 12px; text-align: center; }
        .file-hint { font-size: 13px; color: #666; line-height: 1.6; }

        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 16px; font-size: 18px; font-weight: bold; 
            cursor: pointer; margin-top: 15px;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <h2>𓃥 白六行事曆</h2>
    
    <div class="field">
        <label>活動主題</label>
        <input type="text" id="title" placeholder="例如：白六專案會議">
    </div>

    <div class="field">
        <label>日期與時間</label>
        <div style="display: flex; gap: 8px;">
            <input type="date" id="date" style="flex: 1.5;">
            <input type="time" id="time" style="flex: 1;">
        </div>
    </div>

    <div class="field">
        <label>地點</label>
        <input type="text" id="location" placeholder="輸入地址或場所名稱">
    </div>

    <div class="field">
        <label>檔案附件說明</label>
        <div class="file-box">
            <p class="file-hint">
                💡 <b>操作小秘訣：</b><br>
                點擊下方送出後，請直接在 LINE 對話框點選 <b>「+」>「檔案」</b> 上傳您的本地文件。
            </p>
        </div>
    </div>

    <button onclick="sendInvite()">分享邀請並上傳檔案</button>
</div>

<script>
    const LIFF_ID = "2009222789-j9OVLjbZ";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
        } catch (e) { console.error("初始化失敗", e); }
    }

    async function sendInvite() {
        const title = document.getElementById('title').value || "未命名行程";
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        const location = document.getElementById('location').value || "地點未定";

        if (!date || !time) return alert("請填寫完整的時間資訊");

        // 修正中文亂碼問題：使用 URLSearchParams 或正確的 encodeURIComponent
        // 確保日期格式為 YYYYMMDDTHHMMSS
        const startDateTime = (date + 'T' + time).replace(/-|:/g, "") + "00";
        const endDateTime = startDateTime; // 預設同時間，或自行加 1 小時

        // 這是 Google Calendar 的標準跳轉格式
        const calUrl = `https://www.google.com/calendar/render?action=TEMPLATE` +
                       `&text=${encodeURIComponent(title)}` +
                       `&dates=${startDateTime}/${endDateTime}` +
                       `&location=${encodeURIComponent(location)}` +
                       `&details=${encodeURIComponent("邀請您參加行程。附件檔案請參考對話框下方。")}`;

        const flex = {
            "type": "flex",
            "altText": `📅 邀請：${title}`,
            "contents": {
                "type": "bubble",
                "body": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六行事曆", "weight": "bold", "color": "#00b900", "size": "sm" },
                        { "type": "text", "text": title, "weight": "bold", "size": "xl", "margin": "md" },
                        { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                                { "type": "text", "text": "時間", "color": "#aaaaaa", "size": "sm", "flex": 1 },
                                { "type": "text", "text": `${date} ${time}`, "color": "#666666", "size": "sm", "flex": 4, "wrap": true }
                            ]},
                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                                { "type": "text", "text": "地點", "color": "#aaaaaa", "size": "sm", "flex": 1 },
                                { "type": "text", "text": location, "color": "#666666", "size": "sm", "flex": 4, "wrap": true }
                            ]}
                        ]},
                        { "type": "separator", "margin": "xl" },
                        { "type": "text", "text": "📎 附件檔案正在下方上傳中...", "size": "xs", "color": "#999999", "margin": "md", "style": "italic" }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "button", "style": "primary", "color": "#00b900", "action": {
                            "type": "uri", "label": "加入我的行事曆", "uri": calUrl
                        }}
                    ]
                }
            }
        };

        try {
            const res = await liff.shareTargetPicker([flex]);
            if (res) {
                // 分享成功後關閉視窗，讓使用者直接回到對話框貼檔案
                liff.closeWindow();
            }
        } catch (err) {
            alert("傳送失敗，請確認 LINE Developers 後台權限。");
        }
    }

    init();
</script>
</body>
</html>
