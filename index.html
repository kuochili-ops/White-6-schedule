<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六賀卡·單張版</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <style>
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #f2f4f7; margin: 0; padding: 10px; padding-bottom: 100px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .editor-box { display: flex; gap: 10px; margin-bottom: 12px; background: #fafafa; padding: 12px; border-radius: 20px; border: 1px solid #eee; }
        .input-main { flex: 2; }
        .input-style { flex: 1.1; border-left: 2.5px solid #00b900; padding-left: 10px; }
        label { font-size: 10px; color: #bbb; font-weight: bold; display: block; margin-bottom: 2px; }
        #focus-tag { font-size: 11px; color: #00b900; margin-bottom: 5px; font-weight: 900; }
        input, textarea, select { width: 100%; padding: 7px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 5px; outline: none; }
        .stage { margin: 10px 0; border: 4px solid #00b900; border-radius: 22px; overflow: hidden; position: relative; background: #000; aspect-ratio: 20/13; }
        #cp-wrap { width: 100%; height: 100%; }
        .overlay { position: absolute; bottom: 12%; left: 20px; right: 20px; pointer-events: none; z-index: 10; text-shadow: 0 2px 8px rgba(255,255,255,0.8); }
        .btn-upload { width: 100%; padding: 12px; background: #f0f0f0; border: 2px dashed #ccc; border-radius: 12px; color: #666; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; text-align: center; z-index: 900; }
        .btn-send { width: 100%; max-width: 450px; background: #00b900; color: white; border: none; padding: 18px; border-radius: 20px; font-size: 19px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="padding:5px;"><span style="font-weight:900; color:#00b900;">𓃥 白六賀卡·單張版</span></div>

    <div class="editor-box">
        <div class="input-main">
            <label>姓名</label>
            <input type="text" id="v-to" placeholder="名字" oninput="update()" onfocus="setContext('to')">
            <label>祝福</label>
            <textarea id="v-msg" rows="2" placeholder="內容" oninput="update()" onfocus="setContext('msg')"></textarea>
            <button class="btn-upload" onclick="document.getElementById('f-in').click()">📷 選擇照片</button>
            <input type="file" id="f-in" hidden accept="image/*" onchange="handleFile(this)">
        </div>
        <div class="input-style">
            <div id="focus-tag">設定姓名</div>
            <label>字體大小</label>
            <select id="v-size" onchange="update()"><option value="md">中</option><option value="lg">大</option><option value="xl">特大</option></select>
            <label>文字顏色</label>
            <input type="color" id="v-color" value="#333333" onchange="update()">
        </div>
    </div>

    <div class="stage">
        <div id="cp-wrap"></div>
        <div class="overlay">
            <span id="p-to" style="display:block; font-weight:bold;">名字</span>
            <span id="p-msg" style="display:block;">祝福內容</span>
        </div>
    </div>
</div>

<div class="footer"><button id="go" class="btn-send" onclick="send()">🚀 傳送賀卡</button></div>

<script>
    const LIFF_ID = '2009222789-bvdxbeSL', CLOUD_NAME = 'dnwwaush7', UPLOAD_PRESET = 'ml_default';
    let cp, currentCtx = 'to', card = { to:'', msg:'', toS:'xl', msgS:'md', toC:'#333333', msgC:'#333333', img: 'https://res.cloudinary.com/dnwwaush7/image/upload/v1774012083/cdegpgigtlzghqnjoadb.jpg' };

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        cp = new Croppie(document.getElementById('cp-wrap'), {
            viewport: { width: 300, height: 195, type: 'square' },
            boundary: { width: '100%', height: '100%' }, showZoomer: false
        });
        cp.bind({ url: card.img });
        updateUI();
    }

    async function downsize(b64) {
        return new Promise(r => {
            const i = new Image();
            i.onload = () => {
                const max = 1200; let w = i.width, h = i.height;
                if (w > max) { h *= max / w; w = max; }
                const c = document.createElement('canvas'); c.width = w; c.height = h;
                c.getContext('2d').drawImage(i, 0, 0, w, h);
                r(c.toDataURL('image/jpeg', 0.8));
            };
            i.src = b64;
        });
    }

    function setContext(ctx) {
        currentCtx = ctx;
        document.getElementById('focus-tag').innerText = ctx === 'to' ? '設定姓名' : '設定留言';
        document.getElementById('v-size').value = ctx === 'to' ? card.toS : card.msgS;
        document.getElementById('v-color').value = ctx === 'to' ? card.toC : card.msgC;
    }

    function update() {
        card.to = document.getElementById('v-to').value;
        card.msg = document.getElementById('v-msg').value;
        const s = document.getElementById('v-size').value;
        const c = document.getElementById('v-color').value;
        if (currentCtx === 'to') { card.toS = s; card.toC = c; }
        else { card.msgS = s; card.msgC = c; }
        updateUI();
    }

    function updateUI() {
        const t = document.getElementById('p-to'), m = document.getElementById('p-msg');
        t.innerText = card.to || "名字";
        t.style.color = card.toC;
        t.style.fontSize = { md:'16px', lg:'20px', xl:'24px' }[card.toS];
        m.innerText = card.msg || "祝福內容";
        m.style.color = card.msgC;
        m.style.fontSize = { md:'14px', lg:'17px', xl:'21px' }[card.msgS];
    }

    function handleFile(input) {
        if (input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = async e => {
                const small = await downsize(e.target.result);
                cp.bind({ url: small });
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    async function send() {
        const b = document.getElementById('go'); b.disabled = true; b.innerText = "處理中...";
        try {
            const blob = await cp.result({ type: 'blob', size: { width: 800 }, format: 'jpeg' });
            const fd = new FormData();
            fd.append('file', blob);
            fd.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
            const d = await res.json();
            
            const url = `https://liff.line.me/${LIFF_ID}?data=${encodeURIComponent(JSON.stringify([{ img: d.secure_url, to: card.to, msg: card.msg, ts: card.toS, ms: card.msgS, tc: card.toC, mc: card.msgC }]))}`;
            
            await liff.shareTargetPicker([{
                "type": "flex", "altText": "收到一份白六賀卡！",
                "contents": {
                    "type": "bubble", "size": "mega",
                    "hero": { "type": "image", "url": d.secure_url, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                    "body": { "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六賀卡", "weight": "bold", "color": "#00b900", "size": "xs" },
                        { "type": "text", "text": card.to || "親愛的朋友", "weight": "bold", "size": card.toS, "color": card.toC, "margin": "md" },
                        { "type": "text", "text": card.msg || "祝你有個美好的一天！", "wrap": true, "margin": "sm", "size": card.msgS === 'xl' ? 'lg' : card.msgS, "color": card.msgC }
                    ]},
                    "footer": { "type": "box", "layout": "horizontal", "contents": [
                        { "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "我也要送", "uri": `https://liff.line.me/${LIFF_ID}` } }
                    ]}
                }
            }]);
            liff.closeWindow();
        } catch (e) { b.disabled = false; b.innerText = "🚀 傳送賀卡"; }
    }
    init();
</script>
</body>
</html>
