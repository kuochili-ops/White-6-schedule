<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥白六行事曆</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f8f9fa; }
        body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: var(--primary); font-size: 20px; margin-top: 0; display: flex; align-items: center; gap: 8px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 14px; color: #666; cursor: pointer; }
        #map-box { width: 100%; height: 150px; border-radius: 12px; margin-top: 10px; display: none; overflow: hidden; border: 1px solid #eee; }
        button { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; background: var(--primary); color: white; cursor: pointer; margin-top: 10px; }
        button:active { opacity: 0.8; transform: scale(0.98); }
        .hint { font-size: 11px; color: #aaa; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>𓃥 白六行事曆</h2>
    
    <div class="field">
        <label>活動主題</label>
        <input type="text" id="title" placeholder="活動名稱">
    </div>

    <div class="field">
        <label>時間</label>
        <div style="display: flex; gap: 8px;">
            <input type="date" id="date">
            <input type="time" id="time">
        </div>
    </div>

    <div class="field">
        <label>地點</label>
        <input type="text" id="location" placeholder="輸入地點" onkeyup="debouncedMap()">
        <div id="map-box"><iframe id="map-iframe" width="100%" height="100%" frameborder="0"></iframe></div>
    </div>

    <div class="field">
        <label>備註</label>
        <textarea id="note" style="height: 60px;" placeholder="提醒事項..."></textarea>
    </div>

    <div class="field">
        <label>聯絡資訊</label>
        <label class="checkbox-group">
            <input type="checkbox" id="useMyLine" style="width: auto;" onchange="toggleLineId()"> 勾選以附上我的 LINE 聯絡連結
        </label>
        <input type="text" id="lineid" placeholder="請手動輸入一次您的 LINE ID (如：white666)" style="display: none;">
    </div>

    <button onclick="sendInvite()">分享邀請卡</button>
    <p class="hint">修正傳送錯誤，確保網址完全符合 LINE 規範</p>
</div>

<script>
    const LIFF_ID = "2009222789-j9OVLjbZ";
    let mapTimer;

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
            
            const p = new URLSearchParams(window.location.search);
            if (p.has('t')) document.getElementById('title').value = p.get('t');
            if (p.has('d')) document.getElementById('date').value = p.get('d');
            if (p.has('s')) document.getElementById('time').value = p.get('s');
            if (p.has('l')) { document.getElementById('location').value = p.get('l'); debouncedMap(); }
            if (p.has('n')) document.getElementById('note').value = p.get('n');
            if (p.has('uid')) {
                document.getElementById('lineid').value = p.get('uid');
                document.getElementById('useMyLine').checked = true;
                toggleLineId();
            }
        } catch (e) { console.log(e); }
    }

    function toggleLineId() {
        const input = document.getElementById('lineid');
        const isChecked = document.getElementById('useMyLine').checked;
        input.style.display = isChecked ? "block" : "none";
    }

    function debouncedMap() {
        clearTimeout(mapTimer);
        mapTimer = setTimeout(() => {
            const loc = document.getElementById('location').value;
            const box = document.getElementById('map-box');
            if (loc.trim().length > 1) {
                box.style.display = "block";
                document.getElementById('map-iframe').src = `https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=${encodeURIComponent(loc)}`;
                // 應急方案：
                document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(loc)}&hl=zh-TW&z=16&output=embed`;
            }
        }, 800);
    }

    async function sendInvite() {
        const t = document.getElementById('title').value || "白六行程";
        const d = document.getElementById('date').value;
        const s = document.getElementById('time').value;
        const l = document.getElementById('location').value || "地點未定";
        const n = document.getElementById('note').value || "";
        const isChecked = document.getElementById('useMyLine').checked;
        const uid = isChecked ? document.getElementById('lineid').value : "";

        if (!d || !s) return alert("請填寫時間");

        const start = (d + 'T' + s).replace(/-|:/g, "") + "00";
        const calUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t)}&dates=${start}/${start}&location=${encodeURIComponent(l)}&details=${encodeURIComponent(n)}`;
        
        // CRITICAL BUG FIX: 必須是 liff.line.me
        const liffUrl = `https://liff.line.me/${LIFF_ID}?t=${encodeURIComponent(t)}&d=${d}&s=${s}&l=${encodeURIComponent(l)}&n=${encodeURIComponent(n)}&uid=${encodeURIComponent(uid)}`;
        const contactUrl = uid ? `https://line.me/ti/p/~${uid}` : "";

        const footerContents = [
            { "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "同步至手機日曆", "uri": calUrl }}
        ];

        if (uid) {
            footerContents.push({ "type": "button", "style": "secondary", "margin": "sm", "color": "#eeeeee", "action": { "type": "uri", "label": "👤 聯繫發訊人", "uri": contactUrl }});
        }

        footerContents.push({ "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "轉發/修改行程", "uri": liffUrl }});

        const flex = {
            "type": "flex",
            "altText": `📅 邀請：${t}`,
            "contents": {
                "type": "bubble",
                "body": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六行事曆", "weight": "bold", "color": "#00b900", "size": "sm" },
                        { "type": "text", "text": t, "weight": "bold", "size": "xl", "margin": "md" },
                        { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                            { "type": "text", "text": `📅 ${d} ${s}`, "size": "sm", "color": "#666666" },
                            { "type": "text", "text": `📍 ${l}`, "size": "sm", "color": "#666666", "wrap": true }
                        ]},
                        n ? { "type": "text", "text": n, "margin": "md", "size": "sm", "color": "#333333", "wrap": true, "fontStyle": "italic" } : { "type": "spacer", "size": "xs" }
                    ]
                },
                "footer": { "type": "box", "layout": "vertical", "spacing": "sm", "contents": footerContents }
            }
        };

        try {
            const res = await liff.shareTargetPicker([flex]);
            if (res) liff.closeWindow();
        } catch (err) { alert("傳送失敗：" + err.message); }
    }
    init();
</script>
</body>
</html>
