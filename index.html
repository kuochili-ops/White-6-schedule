<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六行事曆</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { 
            --primary: #00b900; 
            --bg: #1a1a1a; 
            --card-bg: #262626;
            --text: #eeeeee;
            --input-bg: #333333;
            --border: #444444;
        }
        body { 
            font-family: -apple-system, "PingFang TC", "Courier New", sans-serif; 
            background: var(--bg); 
            color: var(--text);
            padding: 15px; 
            margin: 0; 
            display: flex;
            justify-content: center;
        }
        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            max-width: 450px; 
            width: 100%;
            border: 1px solid var(--border);
        }
        h2 { 
            color: var(--primary); 
            font-size: 22px; 
            margin-top: 0; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            letter-spacing: 1px;
        }
        .field { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 13px; 
            color: #888; 
            text-transform: uppercase;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            background: var(--input-bg);
            border: 1.5px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            color: white;
            outline: none; 
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary); background: #3d3d3d; }
        
        /* 模擬機械翻牌字體感 */
        #title { font-weight: bold; font-family: 'Courier New', monospace; }

        .checkbox-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin: 15px 0; 
            font-size: 14px; 
            color: #aaa; 
            cursor: pointer; 
        }
        #map-box { 
            width: 100%; 
            height: 200px; 
            border-radius: 16px; 
            margin-top: 15px; 
            display: none; 
            overflow: hidden; 
            border: 1px solid var(--border); 
        }
        #map-iframe { width: 100%; height: 100%; border: 0; filter: grayscale(0.5) invert(0.9) hue-rotate(180deg); }
        
        button { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 18px; 
            font-size: 18px; 
            font-weight: 800; 
            background: linear-gradient(145deg, #00b900, #009900);
            color: white; 
            cursor: pointer; 
            margin-top: 10px; 
            box-shadow: 0 5px 0 #007a00;
            transition: 0.1s; 
        }
        button:disabled { background: #444; box-shadow: none; cursor: not-allowed; transform: translateY(5px); }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #007a00; }
        
        .hint { font-size: 11px; color: #666; text-align: center; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>𓃥 白六行事曆</h2>
    
    <div class="field">
        <label>活動主題 (支援自動解析)</label>
        <input type="text" id="title" placeholder="貼上 LINE 訊息或輸入主題" onfocus="tryAutoParse()">
    </div>

    <div class="field">
        <label>時間排程</label>
        <div style="display: flex; gap: 8px;">
            <input type="date" id="date">
            <input type="time" id="time">
        </div>
    </div>

    <div class="field">
        <label>地點預覽</label>
        <input type="text" id="location" placeholder="輸入地址或貼上地圖網址" oninput="handleLocationInput()">
        <div id="map-box"><iframe id="map-iframe"></iframe></div>
    </div>

    <div class="field">
        <label class="checkbox-group">
            <input type="checkbox" id="useMyLine" style="width: auto;" onchange="toggleLineId()"> 附上我的 LINE 聯絡連結
        </label>
        <input type="text" id="lineid" placeholder="請輸入您的 LINE ID" style="display: none;">
    </div>

    <button id="sendBtn" onclick="sendInvite()">分享邀請卡</button>
    <p class="hint">系統偵測：若剪貼簿含有時間資訊，點擊主題框將自動填入。<br>© 白六數位工具組</p>
</div>

<script>
    const LIFF_ID = "2009222789-j9OVLjbZ"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw5E9FUqPv_32jX9a7_983YF_l8xTVfy-xJZplRlllX_QdZz8vJ0EX5s-xTq9i1VsQGlA/exec";

    let mapTimer;

    // 自動解析邏輯：支援 2026/03/18 15:00 會議內容 等格式
    async function tryAutoParse() {
        try {
            const text = await navigator.clipboard.readText();
            const dateRegex = /(\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2})/;
            const timeRegex = /(\d{1,2}:\d{2})/;
            
            const dateMatch = text.match(dateRegex);
            const timeMatch = text.match(timeRegex);
            
            // 排除日期與時間後的文字作為標題
            let titleClean = text.replace(dateRegex, '').replace(timeRegex, '').trim();

            if (dateMatch && !document.getElementById('date').value) {
                document.getElementById('date').value = dateMatch[0].replace(/\//g, '-');
            }
            if (timeMatch && !document.getElementById('time').value) {
                document.getElementById('time').value = timeMatch[0];
            }
            if (titleClean && !document.getElementById('title').value) {
                document.getElementById('title').value = titleClean.substring(0, 30);
            }
        } catch (err) { console.log("Clipboard access denied"); }
    }

    function handleLocationInput() {
        const val = document.getElementById('location').value;
        const cleaned = val.replace(/(https?:\/\/[^\s]+)/g, '').trim();
        if (cleaned.length > 2) {
            updateMap(cleaned);
        } else {
            document.getElementById('map-box').style.display = "none";
        }
    }

    function updateMap(query) {
        clearTimeout(mapTimer);
        mapTimer = setTimeout(() => {
            const box = document.getElementById('map-box');
            box.style.display = "block";
            // 使用 Google Maps 搜尋預覽介面
            document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(query)}&output=embed&t=m&z=15`;
        }, 1000);
    }

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const p = new URLSearchParams(window.location.search);
                const getParam = (k) => { 
                    let v = p.get(k); 
                    return (v && v !== "undefined") ? decodeURIComponent(v) : ""; 
                };

                if (p.has('t')) {
                    document.getElementById('title').value = getParam('t');
                    document.getElementById('date').value = getParam('d');
                    document.getElementById('time').value = getParam('s');
                    document.getElementById('location').value = getParam('l');
                    
                    const uid = getParam('uid');
                    if (uid) {
                        document.getElementById('lineid').value = uid;
                        document.getElementById('useMyLine').checked = true;
                        toggleLineId();
                    }
                    if (document.getElementById('location').value) handleLocationInput();
                }
            }
        } catch (e) { console.error(e); }
    }

    function toggleLineId() {
        document.getElementById('lineid').style.display = document.getElementById('useMyLine').checked ? "block" : "none";
    }

    async function sendInvite() {
        const t = document.getElementById('title').value || "未命名行程";
        const d = document.getElementById('date').value;
        const s = document.getElementById('time').value;
        const btn = document.getElementById('sendBtn');

        if (!d || !s) return alert("請填寫日期與時間");

        btn.disabled = true;
        btn.innerText = "正在設定白六提醒...";

        // 🚀 傳送到 Google Apps Script
        try {
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ title: t, time: `${d} ${s}`, type: 'calendar_sync' })
            });
        } catch (e) { console.error("GAS 傳送失敗", e); }

        const fullL = document.getElementById('location').value.replace(/(https?:\/\/[^\s]+)/g, '').trim();
        const uid = document.getElementById('lineid').value.trim();
        const isWithId = document.getElementById('useMyLine').checked && uid;

        // 生成 Google 日曆連結 (處理格式 YYYYMMDDTHHMMSS)
        const startTimestamp = (d + 'T' + s).replace(/-|:/g, "") + "00";
        const calUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t)}&dates=${startTimestamp}/${startTimestamp}&location=${encodeURIComponent(fullL)}&details=由𓃥白六行事曆建立`;

        const flexContents = {
            "type": "bubble",
            "body": {
                "type": "box", "layout": "vertical", "contents": [
                    { "type": "text", "text": "𓃥 白六行事曆", "weight": "bold", "color": "#00b900", "size": "sm" },
                    { "type": "text", "text": t, "weight": "bold", "size": "xl", "margin": "md", "wrap": true },
                    { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                        { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                            { "type": "text", "text": "時間", "color": "#aaaaaa", "size": "sm", "flex": 1 },
                            { "type": "text", "text": `${d} ${s}`, "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                        ]},
                        { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                            { "type": "text", "text": "地點", "color": "#aaaaaa", "size": "sm", "flex": 1 },
                            { "type": "text", "text": fullL || "未設定地點", "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                        ]}
                    ]}
                ]
            },
            "footer": {
                "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                    { "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "🗓 存入 Google 日曆", "uri": calUrl }},
                    ...(isWithId ? [{ "type": "button", "style": "secondary", "color": "#333333", "action": { "type": "uri", "label": "👤 聯繫白六帳戶", "uri": `https://line.me/ti/p/~${uid}` }}] : []),
                    { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "修改此行程", "uri": `https://liff.line.me/${LIFF_ID}?t=${encodeURIComponent(t)}&d=${d}&s=${s}&l=${encodeURIComponent(fullL)}&uid=${encodeURIComponent(uid)}` }}
                ]
            }
        };

        try {
            const res = await liff.shareTargetPicker([ { "type": "flex", "altText": `📅 行程邀請：${t}`, "contents": flexContents } ]);
            if (res) liff.closeWindow();
        } catch (err) {
            btn.disabled = false;
            btn.innerText = "分享邀請卡";
        }
    }
    init();
</script>
</body>
</html>
