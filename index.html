<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六行事曆</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f8f9fa; }
        body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: var(--primary); font-size: 20px; margin-top: 0; display: flex; align-items: center; gap: 8px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #444; }
        input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; outline: none; }
        input:focus { border-color: var(--primary); }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 14px; color: #666; cursor: pointer; }
        #map-box { width: 100%; height: 260px; border-radius: 16px; margin-top: 10px; display: none; overflow: hidden; border: 1px solid #eee; }
        #map-iframe { width: 100%; height: 100%; border: 0; }
        button { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; background: var(--primary); color: white; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .hint { font-size: 11px; color: #aaa; text-align: center; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h2>𓃥 白六行事曆</h2>
    
    <div class="field">
        <label>活動主題</label>
        <input type="text" id="title" placeholder="貼上訊息或輸入主題" onfocus="tryAutoParse()">
    </div>

    <div class="field">
        <label>時間</label>
        <div style="display: flex; gap: 8px;">
            <input type="date" id="date">
            <input type="time" id="time">
        </div>
    </div>

    <div class="field">
        <label>地點</label>
        <input type="text" id="location" placeholder="貼上地圖資訊或輸入地址" oninput="handleLocationInput()">
        <div id="map-box"><iframe id="map-iframe"></iframe></div>
    </div>

    <div class="field">
        <label class="checkbox-group">
            <input type="checkbox" id="useMyLine" style="width: auto;" onchange="toggleLineId()"> 附上我的 LINE 聯絡連結
        </label>
        <input type="text" id="lineid" placeholder="請輸入您的 LINE ID" style="display: none;">
    </div>

    <button id="sendBtn" onclick="sendInvite()">分享邀請卡</button>
    <p class="hint">提醒：點擊主題框可嘗試自動解析剪貼簿資訊。<br>© 白六數位工具組</p>
</div>

<script>
    const LIFF_ID = "2009222789-j9OVLjbZ"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw5E9FUqPv_32jX9a7_983YF_l8xTVfy-xJZplRlllX_QdZz8vJ0EX5s-xTq9i1VsQGlA/exec";

    let mapTimer;

    // 🚀 新增：自動解析剪貼簿內容
    async function tryAutoParse() {
        try {
            const text = await navigator.clipboard.readText();
            const dateRegex = /(\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2})/;
            const timeRegex = /(\d{1,2}:\d{2})/;
            
            const dateMatch = text.match(dateRegex);
            const timeMatch = text.match(timeRegex);
            let titleClean = text.replace(dateRegex, '').replace(timeRegex, '').trim();

            if (dateMatch && !document.getElementById('date').value) {
                document.getElementById('date').value = dateMatch[0].replace(/\//g, '-');
            }
            if (timeMatch && !document.getElementById('time').value) {
                document.getElementById('time').value = timeMatch[0];
            }
            if (titleClean && !document.getElementById('title').value) {
                document.getElementById('title').value = titleClean.substring(0, 30);
            }
        } catch (err) { console.log("無法存取剪貼簿"); }
    }

    function handleLocationInput() {
        const val = document.getElementById('location').value;
        const cleaned = val.replace(/(https?:\/\/[^\s]+)/g, '').trim();
        if (cleaned.length > 0) {
            updateMap(cleaned);
        } else {
            document.getElementById('map-box').style.display = "none";
        }
    }

    function updateMap(query) {
        clearTimeout(mapTimer);
        mapTimer = setTimeout(() => {
            const box = document.getElementById('map-box');
            box.style.display = "block";
            // 修正地圖連結嵌入格式
            document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(query)}&output=embed&hl=zh-TW`;
        }, 800);
    }

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const p = new URLSearchParams(window.location.search);
                const getParam = (k) => { 
                    let v = p.get(k); 
                    return (v && v !== "undefined") ? decodeURIComponent(v) : ""; 
                };

                if (p.has('t')) {
                    document.getElementById('title').value = getParam('t');
                    document.getElementById('date').value = getParam('d');
                    document.getElementById('time').value = getParam('s');
                    document.getElementById('location').value = getParam('l');
                    
                    const uid = getParam('uid');
                    if (uid) {
                        document.getElementById('lineid').value = uid;
                        document.getElementById('useMyLine').checked = true;
                        toggleLineId();
                    }
                    if (document.getElementById('location').value) handleLocationInput();
                }
            }
        } catch (e) { console.error(e); }
    }

    function toggleLineId() {
        document.getElementById('lineid').style.display = document.getElementById('useMyLine').checked ? "block" : "none";
    }

    async function sendInvite() {
        const t = document.getElementById('title').value || "行程邀請";
        const d = document.getElementById('date').value;
        const s = document.getElementById('time').value;
        const btn = document.getElementById('sendBtn');

        if (!d || !s) return alert("請填寫日期與時間");

        btn.disabled = true;
        btn.innerText = "正在同步...";

        try {
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ title: t, time: `${d} ${s}` })
            });
        } catch (e) { console.error("GAS 傳送失敗", e); }

        const fullL = document.getElementById('location').value.replace(/(https?:\/\/[^\s]+)/g, '').trim();
        const uid = document.getElementById('lineid').value.trim();
        const isWithId = document.getElementById('useMyLine').checked && uid;

        // 修正 Google 日曆時間格式
        const start = (d + 'T' + s).replace(/-|:/g, "") + "00";
        const calUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t)}&dates=${start}/${start}&location=${encodeURIComponent(fullL)}`;

        const flexContents = {
            "type": "bubble",
            "body": {
                "type": "box", "layout": "vertical", "contents": [
                    { "type": "text", "text": "𓃥 白六行事曆", "weight": "bold", "color": "#00b900", "size": "sm" },
                    { "type": "text", "text": t, "weight": "bold", "size": "xl", "margin": "md", "wrap": true },
                    { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                        { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                            { "type": "text", "text": "時間", "color": "#aaaaaa", "size": "sm", "flex": 1 },
                            { "type": "text", "text": `${d} ${s}`, "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                        ]},
                        { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                            { "type": "text", "text": "地點", "color": "#aaaaaa", "size": "sm", "flex": 1 },
                            { "type": "text", "text": fullL || "未設定地點", "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                        ]}
                    ]}
                ]
            },
            "footer": {
                "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                    { "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "🗓 存入手機日曆", "uri": calUrl }},
                    ...(isWithId ? [{ "type": "button", "style": "secondary", "color": "#eeeeee", "action": { "type": "uri", "label": "👤 聯繫白六帳戶", "uri": `https://line.me/ti/p/~${uid}` }}] : []),
                    { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "修改此行程", "uri": `https://liff.line.me/${LIFF_ID}?t=${encodeURIComponent(t)}&d=${d}&s=${s}&l=${encodeURIComponent(fullL)}&uid=${encodeURIComponent(uid)}` }}
                ]
            }
        };

        try {
            const res = await liff.shareTargetPicker([ { "type": "flex", "altText": `📅 行程：${t}`, "contents": flexContents } ]);
            if (res) liff.closeWindow();
        } catch (err) {
            btn.disabled = false;
            btn.innerText = "分享邀請卡";
        }
    }
    init();
</script>
</body>
</html>
