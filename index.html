<script>
    async function sendInvite() {
        // ... (取得 title, date, time, location 的邏輯不變) ...

        const gTime = (date + 'T' + time).replace(/-|:/g, "");
        const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${gTime}00/${gTime}00&location=${encodeURIComponent(location)}`;

        const flexData = {
            type: "flex",
            altText: `📅 收到邀請：${title}`,
            contents: {
                "type": "bubble",
                "header": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六行事曆", "weight": "bold", "color": "#00b900" }
                    ]
                },
                "body": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": title, "weight": "bold", "size": "xl" },
                        { "type": "text", "text": `⏰ ${date} ${time}`, "size": "sm", "margin": "md", "color": "#666666" },
                        { "type": "text", "text": `📍 ${location}`, "size": "sm", "color": "#666666", "wrap": true },
                        { "type": "separator", "margin": "lg" },
                        { "type": "text", "text": "📎 相關附件已傳送至下方", "size": "xs", "color": "#aaaaaa", "margin": "md", "style": "italic" }
                    ]
                },
                "footer": {
                    "type": "box", "layout": "vertical", "contents": [
                        { "type": "button", "style": "primary", "color": "#00b900", "action": {
                            "type": "uri", "label": "一鍵存入行事曆", "uri": calendarUrl
                        }}
                    ]
                }
            }
        };

        try {
            // 執行分享
            const res = await liff.shareTargetPicker([flexData]);
            
            if (res) {
                // 分享成功後，提示使用者
                alert("卡片已送出！現在您可以直接在聊天視窗中「上傳檔案」給對方了。");
                liff.closeWindow();
            }
        } catch (error) {
            alert("錯誤：" + error.message);
        }
    }
</script>
