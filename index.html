<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥白六行事曆</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: var(--primary); font-size: 20px; margin-top: 0; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        #map-box { width: 100%; height: 260px; border-radius: 16px; margin-top: 10px; display: none; overflow: hidden; border: 1px solid #eee; }
        button { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; background: var(--primary); color: white; cursor: pointer; }
        button:disabled { background: #ccc; }
        .hint { font-size: 11px; color: #aaa; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
<div class="card">
    <h2>𓃥 白六行事曆</h2>
    <div class="field"><label>活動主題</label><input type="text" id="title" placeholder="例如：白六課程 A"></div>
    <div class="field"><label>時間</label><div style="display: flex; gap: 8px;"><input type="date" id="date"><input type="time" id="time"></div></div>
    <div class="field"><label>地點</label><input type="text" id="location" placeholder="輸入地址" oninput="handleLocationInput()"><div id="map-box"><iframe id="map-iframe" width="100%" height="100%" frameborder="0"></iframe></div></div>
    <button id="sendBtn" onclick="sendInvite()">分享邀請卡</button>
    <p class="hint">提醒：系統將自動於活動前 30 分鐘發送 LINE 通知。</p>
</div>

<script>
    const LIFF_ID = "2009222789-j9OVLjbZ"; //
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw5E9FUqPv_32jX9a7_983YF_l8xTVfy-xJZplRlllX_QdZz8vJ0EX5s-xTq9i1VsQGlA/exec"; //
    let currentUserId = "";

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
            liff.login();
        } else {
            const profile = await liff.getProfile();
            currentUserId = profile.userId; // 自動抓取 User ID
        }
    }

    function handleLocationInput() {
        const val = document.getElementById('location').value;
        if (val) {
            document.getElementById('map-box').style.display = "block";
            document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(val)}&output=embed`;
        }
    }

    async function sendInvite() {
        const t = document.getElementById('title').value || "行程邀請";
        const d = document.getElementById('date').value;
        const s = document.getElementById('time').value;
        if (!d || !s) return alert("請填寫時間");

        document.getElementById('sendBtn').disabled = true;

        // 傳送給 GAS 排定提醒
        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ title: t, time: `${d} ${s}`, target_id: currentUserId })
        });

        const liffUrl = `https://liff.line.me/${LIFF_ID}?t=${encodeURIComponent(t)}&d=${d}&s=${s}`;
        await liff.shareTargetPicker([{
            "type": "flex",
            "altText": `📅 行程：${t}`,
            "contents": {
                "type": "bubble",
                "body": { "type": "box", "layout": "vertical", "contents": [
                    { "type": "text", "text": "𓃥 白六行事曆", "color": "#00b900", "size": "sm" },
                    { "type": "text", "text": t, "weight": "bold", "size": "xl", "margin": "md" },
                    { "type": "text", "text": `時間：${d} ${s}`, "size": "sm", "margin": "sm" }
                ]},
                "footer": { "type": "box", "layout": "vertical", "contents": [
                    { "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "查看行程", "uri": liffUrl }}
                ]}
            }
        }]);
        liff.closeWindow();
    }
    init();
</script>
</body>
</html>
